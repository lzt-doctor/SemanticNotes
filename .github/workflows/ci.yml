name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # なぜ macos-26: iOS 26 SDK を含む Xcode 26 が入っている唯一のランナー世代のため
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # なぜ明示的に選択するか: ランナーには複数の Xcode が入っており、
      # デフォルトがローカル(26.6)と一致するとは限らない。26 系の最新を選ぶ。
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)/Contents/Developer"
          xcodebuild -version

      - name: Build & Test
        run: |
          xcodebuild \
            -project SemanticNotes.xcodeproj \
            -scheme SemanticNotes \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
