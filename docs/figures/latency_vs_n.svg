<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="80" y="24" fill="#333" font-size="14" font-weight="600">検索レイテンシと件数 N の関係(k=10, d=384, クエリ50件平均)</text>
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="80" y1="280" x2="600" y2="280"/>
    <line x1="80" y1="220" x2="600" y2="220"/>
    <line x1="80" y1="160" x2="600" y2="160"/>
    <line x1="80" y1="100" x2="600" y2="100"/>
    <line x1="80" y1="40" x2="600" y2="40"/>
  </g>
  <line x1="80" y1="340" x2="600" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="340" stroke="#999" stroke-width="1"/>
  <g fill="#666">
    <text x="72" y="344" text-anchor="end">0</text>
    <text x="72" y="284" text-anchor="end">2</text>
    <text x="72" y="224" text-anchor="end">4</text>
    <text x="72" y="164" text-anchor="end">6</text>
    <text x="72" y="104" text-anchor="end">8</text>
    <text x="72" y="44" text-anchor="end">10 ms</text>
    <text x="132" y="360" text-anchor="middle">1,000</text>
    <text x="340" y="360" text-anchor="middle">5,000</text>
    <text x="600" y="360" text-anchor="middle">10,000</text>
    <text x="340" y="384" text-anchor="middle">チャンク数 N</text>
  </g>
  <polyline points="132,302.8 340,199.9 600,62.5" fill="none" stroke="#D85A30" stroke-width="2"/>
  <circle cx="132" cy="302.8" r="4" fill="#D85A30"/>
  <circle cx="340" cy="199.9" r="4" fill="#D85A30"/>
  <circle cx="600" cy="62.5" r="4" fill="#D85A30"/>
  <text x="592" y="54" fill="#D85A30" text-anchor="end">総当たり 9.25ms(O(N·d))</text>
  <polyline points="132,329.2 340,327.4 600,324.4" fill="none" stroke="#0F6E56" stroke-width="2"/>
  <circle cx="132" cy="329.2" r="4" fill="#0F6E56"/>
  <circle cx="340" cy="327.4" r="4" fill="#0F6E56"/>
  <circle cx="600" cy="324.4" r="4" fill="#0F6E56"/>
  <text x="592" y="316" fill="#0F6E56" text-anchor="end">HNSW 0.52ms(ほぼ横ばい ≈ O(log N)、recall@10=1.00)</text>
</svg>
